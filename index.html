window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;var b=document.getElementById('install-banner');if(b){b.style.transform='translateY(0)';b.style.opacity='1';}});
window.addEventListener('appinstalled',function(){var b=document.getElementById('install-banner');if(b)b.style.transform='translateY(100%)';deferredPrompt=null;});
window.installApp=async function(){if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;var b=document.getElementById('install-banner');if(b)b.style.transform='translateY(100%)';};
if('serviceWorker' in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
</script>

<script>
// iOS install prompt
(function(){
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isSafari = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios/i.test(navigator.userAgent);
  var isStandalone = window.navigator.standalone === true;
  var isPreview = location.search.indexOf('preview-ios') >= 0;
  if(isPreview || (isIOS && isSafari && !isStandalone)){
    setTimeout(function(){
      var b = document.getElementById('ios-install-banner');
      if(b) b.style.display = 'block';
    }, isPreview ? 500 : 3000);
  }
})();
</script>
  
<style>
/* Lift enable button above install banner */
#enable-btn, .enable-btn, [id*="enable"][class*="btn"],
div[id^="enable"] > button:first-child,
#enableBtn { transition: bottom .3s ease !important; }
</style>
<script>
window.addEventListener('load', function(){
  var banner = document.getElementById('install-banner');
  var iosBanner = document.getElementById('ios-install-banner');
  if(!banner && !iosBanner) return;

  function updateEnablePos(){
    // Try common enable.co.il button selectors
    var btn = document.getElementById('enable-btn') ||
              document.querySelector('[id*="enable"] button') ||
              document.querySelector('.enable-accessibility-btn') ||
              document.querySelector('[class*="enable"][class*="btn"]');
    if(!btn) return;

    var androidVisible = banner &&
      banner.style.transform !== 'translateY(100%)' &&
      banner.style.opacity !== '0';
    var iosVisible = iosBanner && iosBanner.style.display === 'block';

    btn.style.bottom = (androidVisible || iosVisible) ? '80px' : '';
  }

  if(banner){
    new MutationObserver(updateEnablePos)
      .observe(banner, {attributes:true, attributeFilter:['style']});
  }
  if(iosBanner){
    new MutationObserver(updateEnablePos)
      .observe(iosBanner, {attributes:true, attributeFilter:['style']});
  }

  // Also check after enable widget loads
  setTimeout(updateEnablePos, 4000);
});
</script>

<style id="enable-position">
/* Force enable.co.il button to bottom right */
#enable-btn,
.enable-btn,
#enableBtn,
[id^="enable-accessibility"],
div[class*="enable"] > button,
#enable-page-widget {
  position: fixed !important;
  bottom: 16px !important;
  right: 16px !important;
  left: auto !important;
  top: auto !important;
  z-index: 9990 !important;
}
</style>
